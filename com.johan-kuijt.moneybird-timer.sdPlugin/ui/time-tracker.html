<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Moneybird Timer Settings</title>
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
    <style>
        .error {
            color: #ff0000;
            font-size: 12px;
            margin-top: 4px;
        }
        .hidden {
            display: none;
        }
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <sdpi-item label="Display title">
        <sdpi-textfield id="displayTitle" setting="displayTitle" placeholder="Title of the key"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="API Key">
        <sdpi-textfield id="apiKey" setting="apiKey" type="password"></sdpi-textfield>
        <div id="apiKeyError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Administration">
        <sdpi-select id="administrationId" setting="administrationId">
            <option value="">Select an administration</option>
        </sdpi-select>
        <div id="administrationError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Project">
        <sdpi-select id="projectId" setting="projectId">
            <option value="">Select a project</option>
        </sdpi-select>
        <div id="projectError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Contact">
        <sdpi-select id="contactId" setting="contactId">
            <option value="">Select a contact (optional)</option>
        </sdpi-select>
        <div id="contactError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="User">
        <sdpi-select id="userId" setting="userId">
            <option value="">Select a user</option>
        </sdpi-select>
        <div id="userError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Description">
        <sdpi-textfield id="description" setting="description" placeholder="Optional description"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Billable">
        <sdpi-checkbox id="billable" setting="billable"></sdpi-checkbox>
    </sdpi-item>

    <script>
    (function() {
        'use strict';
        
        const { streamDeckClient } = SDPIComponents;
        let isConnected = false;
        let currentSettings = {};
        let isLoading = false;

        function setLoading(loading) {
            isLoading = loading;
            const selects = document.querySelectorAll('sdpi-select');
            selects.forEach(select => {
                if (loading) {
                    select.classList.add('loading');
                } else {
                    select.classList.remove('loading');
                }
            });
        }

        function showError(elementId, message) {
            const errorDiv = document.getElementById(`${elementId}Error`);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
            }
        }

        function hideError(elementId) {
            const errorDiv = document.getElementById(`${elementId}Error`);
            if (errorDiv) {
                errorDiv.classList.add('hidden');
            }
        }

        function updateFormFields(settings = {}) {
            try {
                const relevantKeys = ['apiKey', 'displayTitle', 'administrationId', 'projectId', 'contactId', 'userId', 'description'];
                
                relevantKeys.forEach(key => {
                    const value = settings[key];
                    if (value !== undefined) {
                        try {
                            const element = document.getElementById(key);
                            if (element) {
                                element.value = value?.toString() || '';
                                hideError(key);
                            }
                        } catch (fieldError) {
                            showError(key, 'Error updating field');
                        }
                    }
                });
                
                // Handle billable checkbox separately
                const billableElement = document.getElementById('billable');
                if (billableElement && settings.billable !== undefined) {
                    billableElement.value = settings.billable;
                }
            } catch (error) {
                console.error('Error updating form fields:', error);
            }
        }

        async function updateDropdown(elementId, items = {}, valueKey = 'id', nameKey = 'name', defaultText = 'Select an option') {
            try {
                const select = document.getElementById(elementId);
                if (!select) return;

                const options = [{ value: '', text: defaultText }];
                
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        if (item?.[valueKey]) {
                            let displayName = '';
                            if (elementId === 'contactId') {
                                // Special handling for contacts
                                displayName = item.company_name || 
                                            `${item.firstname || ''} ${item.lastname || ''}`.trim() || 
                                            'Unnamed Contact';
                            } else {
                                displayName = item[nameKey] || '';
                            }
                            
                            if (displayName) {
                                options.push({
                                    value: item[valueKey],
                                    text: displayName
                                });
                            }
                        }
                    });
                } else if (typeof items === 'object') {
                    Object.entries(items).forEach(([key, item]) => {
                        if (item?.[valueKey]) {
                            let displayName = '';
                            if (elementId === 'contactId') {
                                // Special handling for contacts
                                displayName = item.company_name || 
                                            `${item.firstname || ''} ${item.lastname || ''}`.trim() || 
                                            'Unnamed Contact';
                            } else {
                                displayName = item[nameKey] || '';
                            }
                            
                            if (displayName) {
                                options.push({
                                    value: item[valueKey],
                                    text: displayName
                                });
                            }
                        }
                    });
                }

                const optionsHtml = options.map(opt => 
                    `<option value="${opt.value}">${opt.text}</option>`
                ).join('');

                select.innerHTML = optionsHtml;

                // Restore saved value if exists
                if (currentSettings[select.getAttribute('setting')]) {
                    select.value = currentSettings[select.getAttribute('setting')];
                }

                hideError(elementId);
            } catch (error) {
                showError(elementId, `Error loading ${elementId}`);
            }
        }

        async function loadAdministrations() {
            const apiKey = document.getElementById('apiKey')?.value;
            if (!apiKey) return;

            setLoading(true);
            try {
                await streamDeckClient.send('sendToPlugin', {
                    event: 'setGlobalSettings',
                    apiKey: apiKey
                });
            } catch (error) {
                showError('apiKey', 'Error loading administrations');
            } finally {
                setLoading(false);
            }
        }

        async function loadAdministrationData(administrationId) {
            if (!administrationId) {
                // Clear dropdowns
                await updateDropdown('projectId', {}, 'id', 'name', 'Select a project');
                await updateDropdown('contactId', {}, 'id', 'company_name', 'Select a contact (optional)');
                await updateDropdown('userId', {}, 'id', 'name', 'Select a user');
                return;
            }

            setLoading(true);
            try {
                // Set loading state for dropdowns
                await updateDropdown('projectId', {}, 'id', 'name', 'Loading projects...');
                await updateDropdown('contactId', {}, 'id', 'company_name', 'Loading contacts...');
                await updateDropdown('userId', {}, 'id', 'name', 'Loading users...');
                
                // Request data from plugin
                await streamDeckClient.send('sendToPlugin', {
                    event: 'administrationSelected',
                    administrationId: administrationId
                });
            } catch (error) {
                showError('administrationId', 'Error loading administration data');
            } finally {
                setLoading(false);
            }
        }

        async function saveSettings() {
            if (!isConnected) return;

            const settings = {};
            const elements = document.querySelectorAll('[setting]');
            
            elements.forEach(element => {
                const settingName = element.getAttribute('setting');
                
                if (settingName) {
                    let value;
                    if (element.tagName === 'SDPI-CHECKBOX') {
                        value = element.value === true || element.value === 'true';
                    } else {
                        value = element.value || '';
                    }
                
                    settings[settingName] = value;
                }
            });

            await streamDeckClient.setSettings(settings);
            currentSettings = {...currentSettings, ...settings};
        }

        function initializeEventListeners() {
            try {
                // Listen for all setting changes
                const settingElements = document.querySelectorAll('[setting]');
                settingElements.forEach(element => {
                    // Use both input and change events for better compatibility
                    element.addEventListener('input', saveSettings);
                    element.addEventListener('change', saveSettings);
                });

                // API Key input - load administrations
                const apiKeyElement = document.getElementById('apiKey');
                if (apiKeyElement) {
                    let apiKeyTimeout;
                    apiKeyElement.addEventListener('input', (e) => {
                        clearTimeout(apiKeyTimeout);
                        apiKeyTimeout = setTimeout(() => {
                            if (e.target.value?.trim()) {
                                loadAdministrations();
                            }
                        }, 500); // Debounce API calls
                    });
                }

                // Administration select - load projects/contacts/users
                const adminElement = document.getElementById('administrationId');
                if (adminElement) {
                    let lastValue = adminElement.value;
                    
                    // Function to handle administration changes
                    const handleAdminChange = (newValue) => {
                        if (newValue !== lastValue) {
                            console.log('Administration changed from', lastValue, 'to:', newValue);
                            lastValue = newValue;
                            loadAdministrationData(newValue);
                        }
                    };
                    
                    // Listen to standard events
                    adminElement.addEventListener('change', (e) => handleAdminChange(e.target.value));
                    adminElement.addEventListener('input', (e) => handleAdminChange(e.target.value));
                    
                    // Also use MutationObserver to catch programmatic changes
                    const observer = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === 'attributes' && mutation.attributeName === 'value') {
                                handleAdminChange(adminElement.value);
                            }
                        });
                    });
                    
                    // Start observing
                    observer.observe(adminElement, {
                        attributes: true,
                        attributeFilter: ['value']
                    });
                    
                    // Also poll for changes as a fallback (sdpi-select might not trigger all events)
                    setInterval(() => {
                        if (adminElement.value !== lastValue) {
                            handleAdminChange(adminElement.value);
                        }
                    }, 250);
                }
            } catch (error) {
                console.error('Error initializing event listeners:', error);
            }
        }

        streamDeckClient.didReceiveSettings.subscribe(async event => {
            try {
                const settings = event?.payload?.settings || {};
                console.log('Received settings:', settings);
                
                currentSettings = settings;
                
                // Update form fields
                updateFormFields(settings);
                
                // Update administrations dropdown if we have them
                if (settings.administrations && typeof settings.administrations === 'object') {
                    await updateDropdown('administrationId', settings.administrations);
                    
                    // Force trigger change if we have a selected administration
                    if (settings.administrationId) {
                        const adminElement = document.getElementById('administrationId');
                        if (adminElement) {
                            // Set the value again to ensure it's selected
                            adminElement.value = settings.administrationId;
                            
                            // If this is a new administration selection (no projects loaded yet), load the data
                            if (!settings.projects || Object.keys(settings.projects).length === 0) {
                                console.log('Administration set but no projects, loading data...');
                                setTimeout(() => {
                                    loadAdministrationData(settings.administrationId);
                                }, 200);
                            }
                        }
                    }
                }

                // Update other dropdowns if we have the data
                if (settings.projects && typeof settings.projects === 'object') {
                    await updateDropdown('projectId', settings.projects);
                }

                if (settings.contacts && typeof settings.contacts === 'object') {
                    await updateDropdown('contactId', settings.contacts, 'id', 'company_name', 'Select a contact (optional)');
                }

                if (settings.users && typeof settings.users === 'object') {
                    await updateDropdown('userId', settings.users);
                }
            } catch (error) {
                console.error('Error in didReceiveSettings:', error);
            }
        });

        window.connectElgatoStreamDeckSocket = async function(port, uuid, event, info, actionInfo) {
            try {
                await streamDeckClient.connect(port, uuid, event, JSON.parse(info), JSON.parse(actionInfo));
                
                isConnected = true;
                
                initializeEventListeners();
                
                console.log('Connected to Stream Deck');
            } catch (error) {
                console.error('Error connecting to Stream Deck:', error);
            }
        };
    })();
    </script>
</body>
</html>
