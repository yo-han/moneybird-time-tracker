<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Moneybird Timer Settings</title>
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
    <style>
        .error {
            color: #ff0000;
            font-size: 12px;
            margin-top: 4px;
        }
        .hidden {
            display: none;
        }
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <sdpi-item label="Display title">
        <sdpi-textfield id="displayTitle" setting="displayTitle" placeholder="Title of the key"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="API Key">
        <sdpi-textfield id="apiKey" setting="apiKey" type="password"></sdpi-textfield>
        <div id="apiKeyError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Administration">
        <sdpi-select id="administrationId" setting="administrationId">
            <option value="">Select an administration</option>
        </sdpi-select>
        <div id="administrationError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Project">
        <sdpi-select id="projectId" setting="projectId">
            <option value="">Select a project</option>
        </sdpi-select>
        <div id="projectError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="User">
        <sdpi-select id="userId" setting="userId">
            <option value="">Select a user</option>
        </sdpi-select>
        <div id="userError" class="error hidden"></div>
    </sdpi-item>

    <sdpi-item label="Description">
        <sdpi-textfield id="description" setting="description" placeholder="Optional description"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Billable">
        <sdpi-checkbox id="billable" setting="billable"></sdpi-checkbox>
    </sdpi-item>

    <script>
    (function() {
        'use strict';
        
        const { streamDeckClient } = SDPIComponents;
        let isConnected = false;
        let currentSettings = {};
        let currentInstanceId = null;
        let isLoading = false;

        function setLoading(loading) {
            isLoading = loading;
            const selects = document.querySelectorAll('sdpi-select');
            selects.forEach(select => {
                if (loading) {
                    select.classList.add('loading');
                } else {
                    select.classList.remove('loading');
                }
            });
        }

        function getStorageKeyForInstance(instanceId) {
            return `moneybird_timer_settings_${instanceId}`;
        }

        function loadPersistedSettings(instanceId) {
            if (!instanceId) return {};

            try {
                const key = getStorageKeyForInstance(instanceId);
                const persistedSettings = localStorage.getItem(key);
                
                return persistedSettings ? JSON.parse(persistedSettings) : {};
            } catch (error) {
                return {};
            }
        }

        function savePersistedSettings(settings, instanceId) {
            if (!instanceId) return;

            try {
                const key = getStorageKeyForInstance(instanceId);
                const existingSettings = loadPersistedSettings(instanceId);
                const settingsToSave = {
                    ...existingSettings,
                    displayTitle: settings.displayTitle || existingSettings.displayTitle,
                    administrationId: settings.administrationId || existingSettings.administrationId,
                    projectId: settings.projectId || existingSettings.projectId,
                    userId: settings.userId || existingSettings.userId,
                    description: settings.description || existingSettings.description,
                };

                localStorage.setItem(key, JSON.stringify(settingsToSave));
            } catch (error) {
                // Silently fail
            }
        }

        function showError(elementId, message) {
            const errorDiv = document.getElementById(`${elementId}Error`);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
            }
        }

        function hideError(elementId) {
            const errorDiv = document.getElementById(`${elementId}Error`);
            if (errorDiv) {
                errorDiv.classList.add('hidden');
            }
        }

        function updateFormFields(settings = {}) {
            try {
                const relevantKeys = ['apiKey', 'displayTitle', 'administrationId', 'projectId', 'userId', 'description'];
                
                relevantKeys.forEach(key => {
                    const value = settings[key];
                    if (value !== undefined) {
                        try {
                            const element = document.getElementById(key);
                            if (element) {
                                
                                element.value = value?.toString() || '';
                                hideError(key);
                            }
                        } catch (fieldError) {
                            showError(key, 'Error updating field');
                        }
                    }
                });
            } catch (error) {
                // Silently fail
            }
        }

        async function updateDropdown(elementId, items = {}, valueKey = 'id', nameKey = 'name', defaultText = 'Select an option') {
            try {
                const select = document.getElementById(elementId);
                if (!select) return;

                const options = [{ value: '', text: defaultText }];
                
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        if (item?.[valueKey] && item?.[nameKey]) {
                            options.push({
                                value: item[valueKey],
                                text: item[nameKey]
                            });
                        }
                    });
                } else if (typeof items === 'object') {
                    Object.entries(items).forEach(([key, item]) => {
                        if (item?.[valueKey] && item?.[nameKey]) {
                            options.push({
                                value: item[valueKey],
                                text: item[nameKey]
                            });
                        }
                    });
                }

                const optionsHtml = options.map(opt => 
                    `<option value="${opt.value}">${opt.text}</option>`
                ).join('');

                select.innerHTML = optionsHtml;

                if (currentSettings[select.getAttribute('setting')]) {
                    select.value = currentSettings[select.getAttribute('setting')];
                }

                hideError(elementId);
            } catch (error) {
                showError(elementId, `Error loading ${elementId}`);
            }
        }

        async function loadResources(changedField = '') {
            if (isLoading) return;

            setLoading(true);
            try {
                const apiKey = document.getElementById('apiKey')?.value;
                const administrationId = document.getElementById('administrationId')?.value;

                if (!apiKey) {
                    setLoading(false);
                    return;
                }

                hideError('apiKey');
                hideError('administrationId');

                if (changedField === 'administrationId') {
                    if (administrationId) {
                        // Reset project and user dropdowns immediately to show loading state
                        await Promise.all([
                            updateDropdown('projectId', {}, 'id', 'name', 'Loading projects...'),
                            updateDropdown('userId', {}, 'id', 'name', 'Loading users...')
                        ]);
                        
                        await streamDeckClient.send('sendToPlugin', {
                            event: 'administrationSelected',
                            administrationId
                        });
                    } else {
                        // Clear dropdowns if no administration is selected
                        await Promise.all([
                            updateDropdown('projectId', {}, 'id', 'name', 'Select a project'),
                            updateDropdown('userId', {}, 'id', 'name', 'Select a user')
                        ]);
                    }
                    setLoading(false);
                    return;
                }

                const payload = { 
                    event: 'setGlobalSettings', 
                    apiKey 
                };

                if (administrationId) {
                    payload.administrationId = administrationId;
                }

                await streamDeckClient.send('sendToPlugin', payload);
                setLoading(false);
            } catch (error) {
                setLoading(false);
                showError('apiKey', 'Error loading resources');
            }
        }

        async function saveSettings() {
            if (!isConnected || !currentInstanceId) return;

            const settings = {};
            const elements = document.querySelectorAll('[setting]');
            
            elements.forEach(element => {
                const settingName = element.getAttribute('setting');
                
                if (settingName) {
                    let value;
                    if (element.tagName === 'SDPI-CHECKBOX') {
                        value = element.value === true || element.value === 'true';
                    } else {
                      console.log('ELSE', element.value, settingName);
                        value = element.value || currentSettings[settingName];
                    }
                
                    settings[settingName] = value;
                }
            });

            await streamDeckClient.setSettings(settings);
            savePersistedSettings(settings, currentInstanceId);
            currentSettings = {...currentSettings, ...settings};
        }

        function initializeEventListeners() {
            try {
                const settingElements = document.querySelectorAll('[setting]');
                settingElements.forEach(element => {
                    element.addEventListener('input', saveSettings);
                    element.addEventListener('change', saveSettings);
                });

                const apiKeyElement = document.getElementById('apiKey');
                const adminElement = document.getElementById('administrationId');

                if (apiKeyElement) {
                    apiKeyElement.addEventListener('input', async (e) => {
                        const value = e.target.value?.trim();
                        if (value) {
                            await loadResources('apiKey');
                        }
                    });
                }
                if (adminElement) {
                    adminElement.addEventListener('input', async (e) => {
                        const value = e.target.value?.trim();
                        if (value) {
                            await loadResources('administrationId');
                        } else {
                            // Reset project and user dropdowns when no administration is selected
                            updateDropdown('projectId', {});
                            updateDropdown('userId', {});
                        }
                    });
                }
            } catch (error) {
                // Silently fail
            }
        }

        streamDeckClient.didReceiveSettings.subscribe(async event => {
            try {
                setLoading(true);
                const settings = event?.payload?.settings || {};
                
                const persistedSettings = loadPersistedSettings(currentInstanceId);
                const mergedSettings = {...settings, ...persistedSettings};
                
                currentSettings = mergedSettings;
                
                updateFormFields(mergedSettings);
                
                if (settings.administrations && typeof settings.administrations === 'object') {
                    await updateDropdown('administrationId', settings.administrations);
                }

                // If we have a selected administration and received new projects/users
                const selectedAdminId = document.getElementById('administrationId')?.value;
                if (selectedAdminId) {
                    // Update projects if we have them
                    if (settings.projects && typeof settings.projects === 'object') {
                        await updateDropdown('projectId', settings.projects);
                    }

                    // Update users if we have them
                    if (settings.users && typeof settings.users === 'object') {
                        await updateDropdown('userId', settings.users);
                    }
                }
                
                setLoading(false);
            } catch (error) {
                console.error('Error in didReceiveSettings:', error);
                setLoading(false);
            }
        });

        window.connectElgatoStreamDeckSocket = async function(port, uuid, event, info, actionInfo) {
            try {
                await streamDeckClient.connect(port, uuid, event, JSON.parse(info), JSON.parse(actionInfo));
                
                const parsedActionInfo = JSON.parse(actionInfo);
                currentInstanceId = parsedActionInfo.context;
                
                isConnected = true;
                
                const persistedSettings = loadPersistedSettings(currentInstanceId);
                
                if (Object.keys(persistedSettings).length > 0) {
                    updateFormFields(persistedSettings);
                }
                
                initializeEventListeners();
                
                const apiKey = document.getElementById('apiKey')?.value?.trim();
                
                if (apiKey) {
                    // Slight delay before loading resources to prevent too many requests
                    setTimeout(async () => {
                        await loadResources('apiKey');
                    }, 100);
                }
            } catch (error) {
                // Silently fail
            }
        };
    })();
    </script>
</body>
</html>
