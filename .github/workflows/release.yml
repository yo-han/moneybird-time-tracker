name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Stream Deck CLI
      run: npm install -g @elgato/cli@latest
      
    - name: Run linting
      run: npm run lint
      
    - name: Build plugin
      run: npm run build
      
    - name: Package plugin
      run: npm run package
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Moneybird Time Tracker ${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          1. Download the `.streamDeckPlugin` file below
          2. Double-click to install
          3. Configure your Moneybird API token in the Stream Deck software
          
          ### What's Changed
          - See commit history for changes
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/com.johan-kuijt.moneybird-timer.streamDeckPlugin
        asset_name: com.johan-kuijt.moneybird-timer.streamDeckPlugin
        asset_content_type: application/zip