name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Stream Deck CLI
      run: npm install -g @elgato/cli@1.6.0
      
    - name: Run linting
      run: npm run lint
      
    - name: Build plugin
      run: npm run build
      
    - name: Package plugin
      run: npm run package
      
    - name: Get version from tag
      id: get_version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        fi
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Moneybird Time Tracker ${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          1. Download the `.streamDeckPlugin` file below
          2. Double-click to install
          3. Configure your Moneybird API token in the Stream Deck software
          
          ### Features
          - Start/stop time tracking with one button press
          - Project selection
          - Contact assignment
          - User tracking
          - Real-time timer display
          - Billable/non-billable time entries
          
          ### What's Changed
          - See commit history for changes
        files: dist/com.johan-kuijt.moneybird-timer.streamDeckPlugin
        fail_on_unmatched_files: true
        
    - name: Upload artifact for manual workflow
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: moneybird-timer-plugin
        path: dist/com.johan-kuijt.moneybird-timer.streamDeckPlugin
